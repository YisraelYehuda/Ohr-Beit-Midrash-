<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Ohr</title>
</head>
<body>

<h2>Entrar no Ohr</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="senha" placeholder="Senha"><br><br>

<button onclick="login()">Entrar</button>
<button onclick="cadastrar()">Criar Conta</button>

<br><br>

<button onclick="loginGoogle()">Entrar com Google</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBh6ZP--La4IBwsdCoZtm-sRu88UxaFDqM",
    authDomain: "ohr-beit-midrash.firebaseapp.com",
    projectId: "ohr-beit-midrash",
    storageBucket: "ohr-beit-midrash.firebasestorage.app",
    messagingSenderId: "173478100824",
    appId: "1:173478100824:web:56e32e06f300bf28ccef2d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // LOGIN EMAIL
  window.login = function () {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    signInWithEmailAndPassword(auth, email, senha)
      .then(() => {
        alert("Login realizado!");
        window.location.href = "perfil.html";
      })
      .catch((error) => {
        alert("Erro: " + error.message);
      });
  };

  // CADASTRO
  window.cadastrar = function () {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    createUserWithEmailAndPassword(auth, email, senha)
      .then(() => {
        alert("Conta criada!");
      })
      .catch((error) => {
        alert("Erro: " + error.message);
      });
  };

  // GOOGLE LOGIN
  window.loginGoogle = function () {
    const provider = new GoogleAuthProvider();

    signInWithPopup(auth, provider)
      .then(() => {
        alert("Login com Google realizado!");
        window.location.href = "perfil.html";
      })
      .catch((error) => {
        alert("Erro: " + error.message);
      });
  };
</script>

</body>
</html>
