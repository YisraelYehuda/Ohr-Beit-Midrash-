<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Ohr</title>

  <style>
    body {
      margin: 0;
      background: #0d0a04;
      color: #f5edd6;
      font-family: Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 400px;
      background: rgba(255,255,255,0.03);
      padding: 25px;
      border-radius: 12px;
      border: 1px solid rgba(200,168,75,0.3);
      text-align: center;
    }

    h1 {
      color: #e8cc7a;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.05);
      color: #fff;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .gold {
      background: #c8a84b;
      color: black;
    }

    .google {
      background: white;
      color: black;
    }

    .msg {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      display: none;
      white-space: pre-wrap;
    }

    .error {
      background: #3a0000;
      color: #ffcccc;
      display: block;
    }

    .ok {
      background: #003a1f;
      color: #b8ffdc;
      display: block;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Entrar no Ohr</h1>

  <input id="email" type="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button class="gold" onclick="entrar()">Entrar</button>
  <button onclick="criarConta()">Criar conta</button>

  <button class="google" onclick="loginGoogle()">Entrar com Google</button>

  <div id="msg" class="msg"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBh6ZP--La4IBwsdCoZtm-sRu88UxaFDqM",
    authDomain: "ohr-beit-midrash.firebaseapp.com",
    projectId: "ohr-beit-midrash",
    storageBucket: "ohr-beit-midrash.firebasestorage.app",
    messagingSenderId: "173478100824",
    appId: "1:173478100824:web:56e32e06f300bf28ccef2d"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  const msg = document.getElementById("msg");

  function showMsg(text, type) {
    msg.innerText = text;
    msg.className = "msg " + type;
  }

  auth.onAuthStateChanged(function(user) {
    if (user) {
      window.location.href = "perfil.html";
    }
  });

  function criarConta() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    auth.createUserWithEmailAndPassword(email, senha)
      .then(() => {
        showMsg("Conta criada!", "ok");
        window.location.href = "perfil.html";
      })
      .catch(err => {
        showMsg(err.code + "\n" + err.message, "error");
      });
  }

  function entrar() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    auth.signInWithEmailAndPassword(email, senha)
      .then(() => {
        showMsg("Login realizado!", "ok");
        window.location.href = "perfil.html";
      })
      .catch(err => {
        showMsg(err.code + "\n" + err.message, "error");
      });
  }

  function loginGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
      .then(result => {
        showMsg("Bem-vindo " + result.user.email, "ok");
        window.location.href = "perfil.html";
      })
      .catch(err => {
        showMsg(err.code + "\n" + err.message, "error");
      });
  }
</script>

</body>
</html>
