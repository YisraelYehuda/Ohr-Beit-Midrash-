<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Perfil — Ohr Beit Midrash</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #0d0a04;
      color: #f5edd6;
      padding: 24px;
    }

    .card {
      max-width: 700px;
      margin: 40px auto;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200,168,75,0.3);
      border-radius: 12px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      color: #e8cc7a;
    }

    .line {
      margin: 12px 0;
      font-size: 18px;
    }

    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
    }

    .admin {
      background: rgba(200,168,75,0.18);
      color: #e8cc7a;
      border: 1px solid rgba(200,168,75,0.45);
    }

    .user {
      background: rgba(255,255,255,0.08);
      color: #f5edd6;
      border: 1px solid rgba(255,255,255,0.14);
    }

    button, a.button {
      margin-top: 18px;
      margin-right: 10px;
      background: #c8a84b;
      color: #1a1208;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-weight: bold;
    }

    #adminPanel {
      display: none;
      margin-top: 22px;
      padding: 18px;
      border-radius: 10px;
      background: rgba(200,168,75,0.08);
      border: 1px solid rgba(200,168,75,0.28);
    }

    .small {
      opacity: 0.85;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Meu Perfil</h1>

    <div class="line"><strong>Nome:</strong> <span id="nome">Carregando...</span></div>
    <div class="line"><strong>Email:</strong> <span id="email">Carregando...</span></div>
    <div class="line"><strong>Status:</strong> <span id="statusBadge" class="badge user">Verificando...</span></div>

    <div id="adminPanel">
      <h2>Painel do Admin</h2>
      <p class="small">
        Shalom, Yisrael 💙<br>
        O site reconheceu sua conta de desenvolvedor.<br>
        Aqui você pode, no futuro, liberar Premium, acessar áreas exclusivas e gerenciar recursos especiais.
      </p>
      <a class="button" href="cursos.html">Ver cursos</a>
      <a class="button" href="quiz.html">Abrir quiz</a>
    </div>

    <button id="logoutBtn">Sair</button>
    <a class="button" href="index.html">Voltar ao início</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBh6ZP--La4IBwsdCoZtm-sRu88UxaFDqM",
      authDomain: "ohr-beit-midrash.firebaseapp.com",
      projectId: "ohr-beit-midrash",
      storageBucket: "ohr-beit-midrash.firebasestorage.app",
      messagingSenderId: "173478100824",
      appId: "1:173478100824:web:56e32e06f300bf28ccef2d",
      measurementId: "G-E7EF0CRZG0"
    };

    const ADMIN_EMAIL = "orhatorabrasil@gmail.com";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const nomeEl = document.getElementById("nome");
    const emailEl = document.getElementById("email");
    const statusBadge = document.getElementById("statusBadge");
    const adminPanel = document.getElementById("adminPanel");
    const logoutBtn = document.getElementById("logoutBtn");

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("Você precisa estar logado para acessar o perfil.");
        window.location.href = "login.html";
        return;
      }

      const nome = user.displayName || "Usuário Ohr";
      const email = user.email || "Sem email";

      nomeEl.textContent = nome;
      emailEl.textContent = email;

      if (email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
        statusBadge.textContent = "Admin • Yisrael";
        statusBadge.className = "badge admin";
        adminPanel.style.display = "block";
      } else {
        statusBadge.textContent = "Usuário";
        statusBadge.className = "badge user";
        adminPanel.style.display = "none";
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        alert("Você saiu da conta.");
        window.location.href = "login.html";
      } catch (error) {
        alert("Erro ao sair: " + error.message);
      }
    });
  </script>
</body>
</html>
